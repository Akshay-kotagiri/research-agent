name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write        # allow auto-fix step to commit changes
  pull-requests: write   # allow review step to post PR comments

jobs:
  # ---------------------------------------------------------------------------
  # 1. Bandit — security scanning
  # ---------------------------------------------------------------------------
  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r src/ \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ---------------------------------------------------------------------------
  # 3. Pytest — tests + HTML report, auto-fix on failure
  # ---------------------------------------------------------------------------
  test:
    name: Pytest + HTML Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-html

      - name: Run tests
        id: run-tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          pytest tests/ -v \
            --html=test-report.html \
            --self-contained-html \
            --tb=short \
            2>&1 | tee pytest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: test-report.html

      - name: Auto-fix failing tests with Claude Code
        if: failure() && steps.run-tests.outcome == 'failure'
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          prompt: |
            The pytest test suite is failing. Here is the output:

            $(cat pytest-output.txt)

            Your task:
            1. Run `pytest tests/ -v --tb=long` to see full failure details
            2. Read the relevant source files in src/ to understand the bug
            3. Fix the bug(s) in src/ — do NOT modify any files in tests/
            4. Run pytest again to confirm all tests pass
            5. Commit the fix with message: "fix: auto-fix failing tests [claude-code]"
            6. Push the commit

  # ---------------------------------------------------------------------------
  # 4. OpenAI Code Review — runs on every push and PR
  # ---------------------------------------------------------------------------
  code-review:
    name: OpenAI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install OpenAI SDK
        run: pip install openai

      - name: Run OpenAI code review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git diff HEAD~1 -- '*.py' | head -c 12000 > /tmp/diff.txt

          python - <<'PYEOF'
          import sys
          from openai import OpenAI

          with open("/tmp/diff.txt") as f:
              diff = f.read()

          if not diff.strip():
              print("No Python changes detected — skipping review.")
              sys.exit(0)

          client = OpenAI()
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {
                      "role": "system",
                      "content": (
                          "You are a senior Python code reviewer. "
                          "Review the git diff and give concise, actionable feedback. "
                          "Focus on: correctness, security, code quality, and test coverage. "
                          "Flag blocking issues with [BLOCKING]. "
                          "Keep the review under 400 words."
                      ),
                  },
                  {
                      "role": "user",
                      "content": f"Review this git diff:\n\n```diff\n{diff}\n```",
                  },
              ],
          )
          print(response.choices[0].message.content)
          PYEOF
